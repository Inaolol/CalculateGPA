    <path d="M170 154 256 116l86 38v76c0 63-31 111-86 148-55-37-86-85-86-148v-76Z" fill="url(#ink)"/>
    <path d="M206 244v-46M256 244v-78M306 244V132" fill="none" stroke="#f5db8f" stroke-linecap="round" stroke-width="24"/>
    <path d="M196 274h120" fill="none" stroke="#fff8db" stroke-linecap="round" stroke-width="18"/>
    <text x="256" y="342" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="700" text-anchor="middle">4.0</text>
  </g>
