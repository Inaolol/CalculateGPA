<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">GPA Calculator logo</title>
  <desc id="desc">A clean transparent academic crest with rising grade bars and a clear 4.0 score.</desc>
  <defs>
    <linearGradient id="crest" x1="114" x2="398" y1="78" y2="436" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff8db"/>
      <stop offset=".45" stop-color="#f5db8f"/>
      <stop offset="1" stop-color="#c78d35"/>
    </linearGradient>
    <linearGradient id="ink" x1="130" x2="370" y1="118" y2="398" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6c2031"/>
      <stop offset="1" stop-color="#32151e"/>
    </linearGradient>
    <filter id="softShadow" x="62" y="54" width="388" height="420" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" flood-color="#000000" flood-opacity=".22" stdDeviation="18"/>
    </filter>
  </defs>
  <g filter="url(#softShadow)">
